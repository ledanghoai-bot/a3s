services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/srv
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: arq app.workers.tasks.WorkerSettings
    env_file: .env
    volumes:
      - .:/srv
    depends_on:
      - db
      - redis

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: alpha3s
      POSTGRES_PASSWORD: alpha3s
      POSTGRES_DB: alpha3s
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
