name: CI/CD

# Issue #9 Bat 4 (ban GitHub) — thay .gitlab-ci.yml sau khi chuyen sang GitHub.
# Push len main -> lint + test tren runner GitHub -> deploy VPS qua SSH.
#
# Secrets can dat trong repo (Settings > Secrets and variables > Actions):
#   VPS_HOST     = 160.30.157.235
#   VPS_SSH_KEY  = noi dung private key (keypair CI->VPS, public da o VPS
#                  authorized_keys)

on:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (torch CPU-only truoc cho nhe/nhanh, giong Dockerfile)
        run: |
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements.txt ruff pytest
      - name: Lint
        run: ruff check app
      - name: Test (ham logic thuan, khong cham DB)
        run: pytest -v

  deploy:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy len VPS qua SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new "root@$VPS_HOST" \
            "cd /srv/alpha3s && git fetch origin main && git reset --hard origin/main && bash scripts/deploy.sh"
