stages:
  - lint
  - test
  - build
  - deploy

default:
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir -r requirements.txt ruff pytest

lint:
  stage: lint
  script:
    - ruff check app

test:
  stage: test
  script:
    # Issue #9 Bat 2: KHONG con cho phep pass gia khi chua co test (bo dieu
    # kien "|| [ $? -eq 5 ]" cu) - CI gio se THAT SU FAIL neu bat ky test nao
    # fail. Bo test hien tai (tests/) chi cover cac ham logic THUAN (khong
    # cham DB that): handoff.py, orders.py, tools.py, auth_service.py.
    - pytest -v

build:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  # Issue #9 Bat 2: chi XAC NHAN build duoc image, CHUA push/deploy di dau ca
  # (deploy that se lam o Bat sau khi co VPS - #9 Bat 3/4). Chan pipeline
  # som neu Dockerfile bi loi cu phap/dependency thieu, thay vi de phat hien
  # luc deploy that tren VPS.
  script:
    - docker build -t alpha3s-api:ci-test .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image: alpine:3.20
  # Ghi de before_script mac dinh (khong can pip o job nay)
  before_script:
    - apk add --no-cache openssh-client git >/dev/null
  # Issue #9 Bat 4: push len main -> tu dong deploy VPS qua SSH.
  # - VPS_HOST / VPS_SSH_KEY: CI/CD variables (protected — chi co tren nhanh
  #   protected `main`). VPS_SSH_KEY la variable type=file, GitLab tu mount
  #   thanh file tam va bien nay chua DUONG DAN toi file do.
  # - Buoc fetch/reset chay truoc scripts/deploy.sh de chinh script do cung
  #   duoc cap nhat truoc khi thuc thi (tranh chicken-and-egg).
  script:
    - chmod 600 "$VPS_SSH_KEY"
    - ssh -i "$VPS_SSH_KEY" -o StrictHostKeyChecking=accept-new "root@$VPS_HOST"
        "cd /srv/alpha3s
         && git fetch origin main
         && git reset --hard origin/main
         && bash scripts/deploy.sh"
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
